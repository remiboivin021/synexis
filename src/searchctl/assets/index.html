<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Second Cerveau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink { opacity: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-72 border-r border-slate-800 flex flex-col glass">
        <div class="p-6">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-brain text-indigo-500"></i> Second Brain
            </h2>
        </div>

        <nav class="px-4 mb-6 space-y-1">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="switchView('search')" id="nav-search" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 shadow-lg">
                <i class="fas fa-search w-5"></i> Recherche & IA
            </button>
        </nav>

        <div class="px-6 mb-2 flex items-center justify-between gap-2">
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Documents Indexés</span>
            <span id="doc-count" class="text-[10px] text-slate-400">Chargement...</span>
        </div>
        <div class="flex-1 overflow-y-auto px-4 space-y-1" id="document-list"></div>
    </aside>

    <main class="flex-1 overflow-y-auto relative bg-gradient-to-b from-slate-900 to-slate-950">

        <section id="view-dashboard" class="hidden p-8 max-w-5xl mx-auto space-y-8">
            <header>
                <h1 class="text-3xl font-bold">Tableau de Bord</h1>
                <p class="text-slate-400">Aperçu de votre base de connaissances</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <div class="text-slate-500 text-sm">Documents total</div>
                    <div id="dashboard-doc-count" class="text-2xl font-bold mt-1">-</div>
                </div>
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <div class="text-slate-500 text-sm">Dernières sources IA</div>
                    <div id="dashboard-last-sources" class="text-2xl font-bold mt-1 text-indigo-400">-</div>
                </div>
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <div class="text-slate-500 text-sm">Type majoritaire</div>
                    <div id="dashboard-top-type" class="text-2xl font-bold mt-1">-</div>
                </div>
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <div class="text-slate-500 text-sm">État index</div>
                    <div id="dashboard-index-status" class="text-2xl font-bold mt-1 text-emerald-400">Actif</div>
                </div>
            </div>

            <div class="bg-slate-800/20 p-6 rounded-2xl border border-slate-800">
                <h3 class="font-bold mb-4">Documents récents</h3>
                <div id="dashboard-recent-docs" class="space-y-3 text-sm text-slate-300"></div>
            </div>
        </section>

        <section id="view-search" class="p-8">
            <header class="flex flex-col items-center mt-12 mb-12">
                <h1 class="text-4xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Que cherchez-vous ?</h1>
                <div class="w-full max-w-3xl relative">
                    <input type="text" id="search-input"
                        placeholder="Interrogez vos documents..."
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl py-5 px-6 pl-14 focus:ring-2 focus:ring-indigo-500 shadow-2xl backdrop-blur-sm">
                    <i class="fas fa-wand-magic-sparkles absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400"></i>
                    <button id="search-btn" onclick="runSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-indigo-600 px-5 py-2 rounded-xl text-sm font-bold shadow-lg">Analyser</button>
                </div>
            </header>

            <div class="max-w-3xl mx-auto space-y-8">
                <div id="loader" class="hidden text-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent mx-auto"></div></div>
                <article id="synthesis-container" class="hidden bg-slate-800/40 rounded-2xl p-8 border border-slate-700 shadow-xl">
                    <div id="synthesis-text" class="text-slate-200 text-lg leading-relaxed italic border-l-4 border-indigo-500 pl-6"></div>
                </article>
                <div id="sources-container" class="hidden"><div id="sources-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
            </div>
        </section>

    </main>

    <div id="side-panel" class="fixed top-0 right-0 h-full w-[450px] bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-md">
            <div>
                <span id="panel-type" class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">NOTE</span>
                <h2 id="panel-title" class="text-xl font-bold text-white truncate w-64">Titre du document</h2>
            </div>
            <button onclick="closePanel()" class="text-slate-400 hover:text-white p-2 hover:bg-slate-800 rounded-full transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 prose prose-invert">
            <div id="panel-content" class="text-slate-300 leading-relaxed space-y-4"></div>
        </div>

        <div class="p-6 border-t border-slate-800 bg-slate-900/80">
            <button id="panel-open-original" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition-all">
                <i class="fas fa-external-link-alt"></i> Ouvrir le fichier original
            </button>
        </div>
    </div>

    <div id="panel-overlay" onclick="closePanel()" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40"></div>

    <script src="/static/app.js"></script>
</body>
</html>
