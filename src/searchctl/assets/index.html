<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Second Cerveau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink { opacity: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-72 border-r border-slate-800 flex flex-col glass">
        <div class="p-6">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-brain text-indigo-500"></i> Index
            </h2>
            <p class="text-xs text-slate-500 mt-1" id="doc-count">Chargement des documents...</p>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-2" id="document-list">
            </div>

        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
            Système local • v1.0
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        
        <header class="p-8 flex justify-center">
            <div class="w-full max-w-3xl relative">
                <input type="text" id="search-input" 
                    placeholder="Posez une question à votre second cerveau..." 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl py-4 px-6 pl-14 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-2xl">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <button id="search-btn" class="absolute right-3 top-1/2 -translate-y-1/2 bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg text-sm font-medium transition-colors">
                    Rechercher
                </button>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto px-8 pb-12">
            <div class="max-w-3xl mx-auto space-y-8">
                
                <div id="loader" class="hidden text-center py-10">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
                    <p class="mt-4 text-slate-400">Analyse de vos sources en cours...</p>
                </div>

                <article id="synthesis-container" class="hidden bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                    <h3 class="text-indigo-400 text-sm font-semibold uppercase tracking-wider mb-4">Synthèse IA</h3>
                    <div id="synthesis-text" class="text-slate-200 leading-relaxed text-lg italic border-l-4 border-indigo-500/30 pl-6">
                        </div>
                </article>

                <div id="sources-container" class="hidden">
                    <h3 class="text-slate-400 text-sm font-semibold mb-4">Sources consultées</h3>
                    <div id="sources-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>

            </div>
        </section>
    </main>

    <div id="side-panel" class="fixed top-0 right-0 h-full w-[450px] bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-md">
            <div>
                <span id="panel-type" class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">NOTE</span>
                <h2 id="panel-title" class="text-xl font-bold text-white truncate w-64">Titre du document</h2>
            </div>
            <button onclick="closePanel()" class="text-slate-400 hover:text-white p-2 hover:bg-slate-800 rounded-full transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 prose prose-invert">
            <div id="panel-content" class="text-slate-300 leading-relaxed space-y-4"></div>
        </div>

        <div class="p-6 border-t border-slate-800 bg-slate-900/80">
            <button id="panel-open-original" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition-all">
                <i class="fas fa-external-link-alt"></i> Ouvrir le fichier original
            </button>
        </div>
    </div>

    <div id="panel-overlay" onclick="closePanel()" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40"></div>

    <script src="/static/app.js"></script>
</body>
</html>
