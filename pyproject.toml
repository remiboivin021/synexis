[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "synexis-brain"
version = "0.1.0"
description = "Local-first markdown exocortex engine"
requires-python = ">=3.11"
dependencies = [
  "pyyaml>=6.0",
  "textual>=0.60.0",
  "tantivy>=0.22.0",
  "qdrant-client>=1.9.0",
  "sentence-transformers>=3.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
synexis = "synexis_brain.tui:run_tui"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["synexis_brain*"]
exclude = ["tests*", "docs*", "data*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
